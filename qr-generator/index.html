<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generator QR</title>
  <style>
    body { margin: 0; padding: 24px; font-family: Arial, sans-serif; background: #f9fafb; color: #111827; }
    .wrap { max-width: 760px; margin: 0 auto; background: #fff; border-radius: 18px; padding: 28px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    h1 { margin-top: 0; font-size: 26px; }
    label { display: block; font-weight: 700; margin: 18px 0 8px; }
    input { width: 100%; box-sizing: border-box; padding: 13px 14px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 16px; }
    button, a.download { display: inline-block; border: 0; margin: 12px 8px 0 0; padding: 12px 16px; border-radius: 10px; background: #111827; color: white; font-weight: 700; text-decoration: none; cursor: pointer; }
    .secondary { background: #374151 !important; }
    #qrcode { margin-top: 24px; padding: 16px; border: 1px dashed #d1d5db; border-radius: 14px; display: none; background: white; }
    #qrcode img { width: 280px; height: 280px; display: block; }
    .hint { color: #6b7280; line-height: 1.5; }
    .error { color: #b91c1c; font-weight: 700; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Generator QR</h1>

    <p class="hint">
      Tutaj generujesz QR do strony pośredniej, a nie bezpośrednio do Otodom.
    </p>

    <label for="urlInput">Link do zakodowania w QR</label>
    <input id="urlInput" value="https://wlodar91.github.io/qrbanerkajdasza.github.io/" />

    <button id="generateBtn">Generuj QR</button>
    <button id="clearBtn" class="secondary">Wyczyść</button>

    <p id="message" class="hint"></p>

    <div id="qrcode">
      <img id="qrImage" alt="Kod QR" />
    </div>

    <div id="downloads"></div>

    <p class="hint">
      Do druku najlepiej pobrać SVG. Do szybkiego użycia wystarczy PNG.
    </p>
  </main>

  <script>
    const urlInput = document.getElementById("urlInput");
    const generateBtn = document.getElementById("generateBtn");
    const clearBtn = document.getElementById("clearBtn");
    const qrcode = document.getElementById("qrcode");
    const qrImage = document.getElementById("qrImage");
    const downloads = document.getElementById("downloads");
    const message = document.getElementById("message");

    function isValidHttpUrl(value) {
      try {
        const url = new URL(value);
        return url.protocol === "http:" || url.protocol === "https:";
      } catch (_) {
        return false;
      }
    }

    function generateQr() {
      const value = urlInput.value.trim();

      qrcode.style.display = "none";
      downloads.innerHTML = "";
      message.textContent = "";
      message.className = "hint";

      if (!isValidHttpUrl(value)) {
        message.textContent = "Wpisz poprawny link zaczynający się od https:// lub http://";
        message.className = "error";
        return;
      }

      const encoded = encodeURIComponent(value);

      const pngUrl = `https://api.qrserver.com/v1/create-qr-code/?size=1024x1024&format=png&margin=20&data=${encoded}`;
      const svgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=1024x1024&format=svg&margin=20&data=${encoded}`;

      qrImage.src = pngUrl;
      qrcode.style.display = "inline-block";

      const pngLink = document.createElement("a");
      pngLink.href = pngUrl;
      pngLink.target = "_blank";
      pngLink.className = "download";
      pngLink.textContent = "Pobierz PNG";

      const svgLink = document.createElement("a");
      svgLink.href = svgUrl;
      svgLink.target = "_blank";
      svgLink.className = "download secondary";
      svgLink.textContent = "Pobierz SVG";

      downloads.appendChild(pngLink);
      downloads.appendChild(svgLink);

      message.textContent = "QR wygenerowany. Zeskanuj go telefonem przed drukiem.";
    }

    generateBtn.addEventListener("click", generateQr);

    clearBtn.addEventListener("click", function () {
      urlInput.value = "";
      qrcode.style.display = "none";
      qrImage.src = "";
      downloads.innerHTML = "";
      message.textContent = "";
    });

    urlInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") generateQr();
    });
  </script>
</body>
</html>
